commit-msg:
  jobs:
    - name: conventional-commit
      run: |
        msg=$(head -1 {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|hotfix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?(!)?: .+'; then
          echo "❌ Invalid commit message: $msg"
          echo ""
          echo "Expected format: <type>(<scope>): <description>"
          echo "Types: feat, fix, hotfix, docs, style, refactor, perf, test, build, ci, chore, revert"
          echo ""
          echo "Examples:"
          echo "  feat: add login screen"
          echo "  fix(api): fix error 500"
          echo "  refactor!: change data structure"
          exit 1
        fi

pre-commit:
  jobs:
    - name: lint-staged
      run: pnpm lint-staged

pre-push:
  jobs:
    - name: build
      run: pnpm build
